<div
  class="relative w-full h-full flex flex-col bg-gradient-to-t to-white from-sky-200"
>
  <section class="relative flex-none w-full h-full flex flex-col md:flex-row">
    <div
      class="w-full md:w-1/4 h-1/4 md:h-full p-2 md:p-4 flex flex-row md:flex-col gap-6 md:gap-24 overflow-y-scroll"
    >
      <img
        class="w-1/3 md:w-11/12 h-11/12 md:h-1/4 object-cover bg-white flex-none"
        [ngClass]="{ 'border-2 border-black': true, 'border-none': false }"
        src="https://picsum.photos/800?1"
      />
      <img
        class="w-1/3 md:w-11/12 h-11/12 md:h-1/4 object-cover bg-white flex-none"
        [ngClass]="{ 'border-2 border-black': false, 'border-none': true }"
        src="https://picsum.photos/800?2"
      />
      <img
        class="w-1/3 md:w-11/12 h-11/12 md:h-1/4 object-cover bg-white flex-none"
        [ngClass]="{ 'border-2 border-black': false, 'border-none': true }"
        src="https://picsum.photos/800?3"
      />
      <img
        class="w-1/3 md:w-11/12 h-11/12 md:h-1/4 object-cover bg-white flex-none"
        [ngClass]="{ 'border-2 border-black': false, 'border-none': true }"
        src="https://picsum.photos/800?4"
      />
      <img
        class="w-1/3 md:w-11/12 h-11/12 md:h-1/4 object-cover bg-white flex-none"
        [ngClass]="{ 'border-2 border-black': false, 'border-none': true }"
        src="https://picsum.photos/800?5"
      />
      <img
        class="w-1/3 md:w-11/12 h-11/12 md:h-1/4 object-cover bg-white flex-none"
        [ngClass]="{ 'border-2 border-black': false, 'border-none': true }"
        src="https://picsum.photos/800?6"
      />
      <img
        class="w-1/3 md:w-11/12 h-11/12 md:h-1/4 object-cover bg-white flex-none"
        [ngClass]="{ 'border-2 border-black': false, 'border-none': true }"
        src="https://picsum.photos/800?7"
      />
    </div>
    <div
      class="w-full md:w-3/4 h-3/4 md:h-full p-2 md:p-4 flex justify-center items-center overflow-y-auto"
    >
      <div class="relative w-full h-auto">
        <img
          class="w-full object-contain border-2"
          src="https://picsum.photos/2200"
          alt=""
        />
      </div>
    </div>
  </section>
</div>
