<div class="w-full h-full flex flex-col overflow-y-auto" #mainContainer>
  <section
    class="relative flex-none flex justify-start items-start w-full h-[100svh] bg-black"
  >
    <button
      class="absolute top-4 right-4 w-16 h-16 rounded-full bg-black text-white transition-all transform duration-300 ease-in-out hover:bg-white hover:text-black z-20"
      [routerLink]="'/gallery'"
    >
      gallery
    </button>
    <div class="absolute w-full h-full z-0">
      <video
        class="w-full h-full object-cover"
        src=".\assets\videos\video01.mp4"
        muted
        autoplay
        loop
        (loadeddata)="videoPlay($event)"
      ></video>
    </div>
    <div
      class="p-32 flex flex-col gap-4 justify-center items-center text-center align-middle text-white z-10"
    >
      <div class="flex flex-row items-start">
        <p class="text-9xl select-none text-black font-extrabold">청</p>
        <div class="flex flex-col h-full">
          <p class="text-3xl font-medium">춘</p>
          <p class="text-3xl font-medium">을</p>
        </div>
      </div>
      <div class="flex flex-row">
        <p class="text-9xl select-none text-black font-extrabold">사</p>
        <div class="flex flex-col h-full">
          <p class="text-3xl font-medium">는</p>
        </div>
      </div>
      <div class="flex flex-row">
        <p class="text-9xl select-none text-black font-extrabold">우</p>
        <div class="flex flex-col h-full">
          <p class="text-3xl font-medium">리</p>
          <p class="text-3xl font-medium">의</p>
        </div>
      </div>
      <div class="flex flex-row">
        <p class="text-9xl select-none text-black font-extrabold">회</p>
        <div class="flex flex-col h-full">
          <p class="text-3xl font-medium">모</p>
          <p class="text-3xl font-medium">임</p>
        </div>
      </div>
    </div>
  </section>
  <section
    class="flex-none flex justify-center items-center w-full h-[100svh] select-none bg-black"
  >
    <div class="w-full px-12 flex flex-row justify-between">
      <div
        class="w-48 h-48 flex justify-center items-center bg-gradient-to-tr to-sky-600 from-purple-600 rounded-full"
        data-speed="0.1"
      >
        <div class="w-44 h-44 bg-white rounded-full"></div>
      </div>
    </div>
  </section>
</div>
